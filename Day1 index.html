<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OhMi Cup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0f0f0f;
color: #f0f0f0;
font-family: ‘Barlow’, sans-serif;
min-height: 100vh;
padding-bottom: 80px;
}

.app-header {
background: linear-gradient(135deg, #8B0000 0%, #1a1a1a 40%, #1a1a1a 60%, #001a33 100%);
padding: 16px 20px 12px;
text-align: center;
border-bottom: 3px solid #333;
}

.app-header h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.4rem;
letter-spacing: 3px;
background: linear-gradient(90deg, #ff4444, #fff, #FFCB05);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.app-header .subtitle {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.8rem;
letter-spacing: 2px;
color: #888;
text-transform: uppercase;
margin-top: 2px;
}

.score-banner {
display: flex;
align-items: stretch;
background: #1a1a1a;
border-bottom: 2px solid #333;
min-height: 64px;
}

.banner-team {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 10px 16px;
gap: 2px;
}

.banner-team.oh { background: linear-gradient(135deg, #BB0000 0%, #8B0000 100%); }
.banner-team.mi { background: linear-gradient(135deg, #001a33 0%, #00274C 100%); }

.banner-team .team-label {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.7rem;
letter-spacing: 2px;
text-transform: uppercase;
opacity: 0.85;
}

.banner-team .team-score {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.6rem;
line-height: 1;
}

.banner-divider {
display: flex;
align-items: center;
justify-content: center;
padding: 0 12px;
background: #1a1a1a;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.75rem;
letter-spacing: 1px;
color: #888;
text-transform: uppercase;
}

.progress-bar-wrap { background: #242424; height: 6px; display: flex; }
.progress-oh { background: #BB0000; transition: width 0.6s ease; }
.progress-mi { background: #00274C; transition: width 0.6s ease; }

.tabs {
position: fixed;
bottom: 0; left: 0; right: 0;
display: flex;
background: #111;
border-top: 2px solid #333;
z-index: 100;
}

.tab-btn {
flex: 1;
padding: 12px 8px 10px;
background: none;
border: none;
color: #888;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.75rem;
letter-spacing: 1px;
text-transform: uppercase;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
}

.tab-btn .tab-icon { font-size: 1.2rem; }
.tab-btn.active { color: #FFCB05; }

.panel { display: none; padding: 16px; }
.panel.active { display: block; }

.section-header {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.7rem;
letter-spacing: 2px;
text-transform: uppercase;
color: #888;
padding: 12px 0 8px;
border-bottom: 1px solid #333;
margin-bottom: 12px;
}

.points-table {
background: #1a1a1a;
border-radius: 8px;
overflow: hidden;
margin-bottom: 20px;
border: 1px solid #333;
}

.points-table table { width: 100%; border-collapse: collapse; font-family: ‘Barlow Condensed’, sans-serif; }

.points-table th {
padding: 8px 12px;
font-size: 0.7rem;
letter-spacing: 1px;
text-transform: uppercase;
color: #888;
text-align: left;
background: #242424;
border-bottom: 1px solid #333;
}

.points-table th.oh-col { color: #ff4444; text-align: center; }
.points-table th.mi-col { color: #FFCB05; text-align: center; }

.points-table td { padding: 9px 12px; font-size: 0.95rem; border-bottom: 1px solid #333; color: #f0f0f0; }
.points-table td.oh-col { text-align: center; color: #ff4444; font-weight: 600; }
.points-table td.mi-col { text-align: center; color: #FFCB05; font-weight: 600; }
.points-table tr:last-child td { border-bottom: none; }

.points-table tr.total-row td { background: #242424; font-weight: 700; font-size: 1.05rem; }
.points-table tr.total-row td.oh-col { color: #ff4444; }
.points-table tr.total-row td.mi-col { color: #FFCB05; }

.session-label { color: #f0f0f0; font-size: 0.85rem; }
.session-format-badge {
display: inline-block;
font-size: 0.6rem;
letter-spacing: 1px;
text-transform: uppercase;
background: #242424;
color: #888;
padding: 2px 6px;
border-radius: 3px;
margin-left: 6px;
vertical-align: middle;
}

.matchup-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
.matchup-header { display: flex; align-items: stretch; min-height: 70px; }

.matchup-team { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: center; }
.matchup-team.oh { border-left: 4px solid #BB0000; }
.matchup-team.mi { border-right: 4px solid #00274C; text-align: right; }
.matchup-team .player-name { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; font-weight: 700; line-height: 1.2; }
.matchup-team.oh .player-name { color: #ff4444; }
.matchup-team.mi .player-name { color: #FFCB05; }

.matchup-status-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 10px; min-width: 80px; text-align: center; }
.match-label { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.match-status { font-family: ‘Bebas Neue’, sans-serif; font-size: 1.4rem; line-height: 1; }
.match-status.oh-up { color: #ff4444; }
.match-status.mi-up { color: #FFCB05; }
.match-status.tied { color: #888; }

.holes-thru { font-family: ‘Barlow’, sans-serif; font-size: 0.65rem; color: #888; margin-top: 2px; }

.hole-dots { display: flex; padding: 8px 10px; gap: 4px; background: #242424; flex-wrap: wrap; border-top: 1px solid #333; }
.hole-dot {
width: 22px; height: 22px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.6rem; font-weight: 700;
border: 1.5px solid #333; color: #888; background: #1a1a1a;
}
.hole-dot.oh { background: #BB0000; border-color: #BB0000; color: #fff; }
.hole-dot.mi { background: #00274C; border-color: #00274C; color: #fff; }
.hole-dot.halved { background: #555; border-color: #555; color: #ccc; }

.session-group { margin-bottom: 24px; }
.session-group-header { font-family: ‘Bebas Neue’, sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: #f0f0f0; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }

.session-status-pill { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.session-status-pill.active { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
.session-status-pill.upcoming { background: #242424; color: #888; border: 1px solid #333; }
.session-status-pill.closed { background: #2a2a2a; color: #666; border: 1px solid #444; }

.select-wrap { position: relative; margin-bottom: 16px; }
.select-wrap select { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; appearance: none; cursor: pointer; }
.select-wrap::after { content: ‘▾’; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #888; pointer-events: none; }

.hole-entry-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.hole-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.hole-entry-num { font-family: ‘Bebas Neue’, sans-serif; font-size: 1.6rem; color: #f0f0f0; }
.hole-entry-par { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.85rem; color: #888; }

.winner-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.winner-btn { padding: 12px 6px; border: 2px solid; border-radius: 8px; background: none; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
.winner-btn.oh-btn { border-color: #BB0000; color: #ff4444; }
.winner-btn.oh-btn.selected { background: #BB0000; color: #fff; }
.winner-btn.halved-btn { border-color: #555; color: #aaa; }
.winner-btn.halved-btn.selected { background: #555; color: #fff; }
.winner-btn.mi-btn { border-color: #00274C; color: #FFCB05; }
.winner-btn.mi-btn.selected { background: #00274C; color: #FFCB05; }

.live-status-bar { background: #242424; border: 1px solid #333; border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; text-align: center; }
.live-status-bar .status-label { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 4px; }
.live-status-bar .status-value { font-family: ‘Bebas Neue’, sans-serif; font-size: 2rem; }
.live-status-bar .status-value.oh-up { color: #ff4444; }
.live-status-bar .status-value.mi-up { color: #FFCB05; }
.live-status-bar .status-value.tied { color: #888; }

.admin-section { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.admin-section h3 { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: #888; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #333; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 11px 14px; background: #242424; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; font-family: ‘Barlow’, sans-serif; font-size: 0.95rem; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: #FFCB05; }

.btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-weight: 700; transition: all 0.15s; margin-bottom: 8px; }
.btn-primary { background: #FFCB05; color: #111; }
.btn-secondary { background: #242424; color: #f0f0f0; border: 1px solid #333; }

.admin-session-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
.admin-session-row:last-child { border-bottom: none; }
.admin-session-info { flex: 1; }
.admin-session-name { font-family: ‘Barlow Condensed’, sans-serif; font-size: 1rem; font-weight: 600; color: #f0f0f0; }
.admin-session-meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
.admin-session-actions { display: flex; gap: 8px; }

.btn-sm { padding: 6px 12px; border: 1px solid #333; border-radius: 6px; background: #242424; color: #f0f0f0; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.75rem; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; }
.btn-sm.open { border-color: #4caf50; color: #4caf50; }
.btn-sm.close { border-color: #BB0000; color: #ff4444; }

.password-screen { padding: 40px 20px; text-align: center; }
.password-screen h2 { font-family: ‘Bebas Neue’, sans-serif; font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 8px; color: #f0f0f0; }
.password-screen p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
.password-screen input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; font-family: ‘Barlow’, sans-serif; font-size: 1rem; text-align: center; margin-bottom: 12px; }
.password-screen input:focus { outline: none; border-color: #FFCB05; }
.error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

.pairing-builder { background: #242424; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
.pairing-builder h4 { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
.pairing-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.pairing-team-col label { display: block; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.pairing-team-col.oh-col label { color: #ff4444; }
.pairing-team-col.mi-col label { color: #FFCB05; }
.pairing-team-col select { width: 100%; padding: 8px 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; font-family: ‘Barlow’, sans-serif; font-size: 0.85rem; margin-bottom: 6px; }

.starting-hole-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.starting-hole-row label { font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; color: #888; white-space: nowrap; }
.starting-hole-row select { flex: 1; padding: 8px 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #f0f0f0; font-family: ‘Barlow’, sans-serif; font-size: 0.85rem; }

.add-pairing-btn { background: none; border: 1px dashed #333; border-radius: 8px; color: #888; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; padding: 10px; width: 100%; cursor: pointer; margin-bottom: 8px; }
.remove-pairing-btn { background: none; border: none; color: #ff4444; font-size: 1rem; cursor: pointer; padding: 4px; float: right; }

.loading-state, .empty-state { text-align: center; padding: 30px 20px; color: #888; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.95rem; letter-spacing: 1px; }
.spinner { width: 28px; height: 28px; border: 3px solid #333; border-top-color: #FFCB05; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #242424; border: 1px solid #333; border-radius: 8px; padding: 12px 20px; font-family: ‘Barlow Condensed’, sans-serif; font-size: 0.9rem; z-index: 200; opacity: 0; transition: opacity 0.2s; white-space: nowrap; color: #f0f0f0; }
.toast.show { opacity: 1; }
.toast.success { border-color: #4caf50; color: #4caf50; }
.toast.error { border-color: #ff4444; color: #ff4444; }

.mt-16 { margin-top: 16px; }
</style>

</head>
<body>

<div class="app-header">
  <h1>OhMi Cup</h1>
  <div class="subtitle">Ohio vs Michigan · 2026</div>
</div>

<div class="score-banner">
  <div class="banner-team oh">
    <div class="team-label">🔴 Ohio</div>
    <div class="team-score" id="oh-total">—</div>
  </div>
  <div class="banner-divider">vs</div>
  <div class="banner-team mi">
    <div class="team-label">Michigan 🔵</div>
    <div class="team-score" id="mi-total">—</div>
  </div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-oh" id="progress-oh" style="width:50%"></div>
  <div class="progress-mi" id="progress-mi" style="width:50%"></div>
</div>

<div id="panel-scoreboard" class="panel active">
  <div class="section-header">Points by Round</div>
  <div class="points-table">
    <table>
      <thead>
        <tr>
          <th>Session</th>
          <th class="oh-col">OH</th>
          <th class="mi-col">MI</th>
        </tr>
      </thead>
      <tbody id="points-table-body">
        <tr><td colspan="3"><div class="loading-state"><div class="spinner"></div>Loading...</div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="sessions-container">
    <div class="loading-state"><div class="spinner"></div>Loading sessions...</div>
  </div>
</div>

<div id="panel-entry" class="panel">
  <div class="section-header">Score Entry</div>
  <div class="select-wrap">
    <select id="entry-session-select"><option value="">Select session...</option></select>
  </div>
  <div class="select-wrap">
    <select id="entry-matchup-select" disabled><option value="">Select matchup...</option></select>
  </div>
  <div id="entry-content" style="display:none">
    <div class="live-status-bar">
      <div class="status-label">Match Status</div>
      <div class="status-value tied" id="entry-status-value">TIED</div>
      <div class="holes-thru" id="entry-holes-thru">Thru 0</div>
    </div>
    <div id="entry-holes-container"></div>
  </div>
</div>

<div id="panel-admin" class="panel">
  <div id="admin-password-gate">
    <div class="password-screen">
      <h2>Admin Access</h2>
      <p>Enter the admin password to continue</p>
      <input type="password" id="admin-pw-input" placeholder="Password" />
      <button class="btn btn-primary" onclick="checkAdminPw()">Enter</button>
      <div class="error-msg" id="admin-pw-error"></div>
    </div>
  </div>
  <div id="admin-content" style="display:none">
    <div class="admin-section">
      <h3>Create Session</h3>
      <div class="form-group"><label>Session Name</label><input type="text" id="session-name" placeholder="e.g. Friday Morning" /></div>
      <div class="form-group"><label>Date</label><input type="date" id="session-date" /></div>
      <div class="form-group">
        <label>Format</label>
        <select id="session-format">
          <option value="scramble">Scramble</option>
          <option value="best_ball">Best Ball</option>
          <option value="alternate_shot">Alternate Shot</option>
          <option value="singles">Singles</option>
        </select>
      </div>
      <div class="form-group">
        <label>Team Size (players per side)</label>
        <select id="session-team-size">
          <option value="1">1 (Singles)</option>
          <option value="2" selected>2</option>
          <option value="4">4</option>
        </select>
      </div>
      <div class="form-group"><label>Course</label><select id="session-course"><option value="">Loading...</option></select></div>
      <div class="form-group"><label>Sort Order</label><input type="number" id="session-sort" value="1" min="1" /></div>
      <div style="margin-top:16px;margin-bottom:8px;">
        <label style="font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;color:#888;">Matchup Pairings</label>
      </div>
      <div id="pairings-container"></div>
      <button class="add-pairing-btn" onclick="addPairingRow()">+ Add Matchup</button>
      <button class="btn btn-primary mt-16" onclick="createSession()">Create Session</button>
    </div>
    <div class="admin-section">
      <h3>Manage Sessions</h3>
      <div id="admin-sessions-list"><div class="loading-state"><div class="spinner"></div>Loading...</div></div>
    </div>
  </div>
</div>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('scoreboard')" id="tab-scoreboard">
    <span class="tab-icon">🏆</span>Scoreboard
  </button>
  <button class="tab-btn" onclick="switchTab('entry')" id="tab-entry">
    <span class="tab-icon">⛳</span>Score Entry
  </button>
  <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin">
    <span class="tab-icon">⚙️</span>Admin
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://vtnxjheizurqardgreeq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0bnhqaGVpenVycWFyZGdyZWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzA2MTIsImV4cCI6MjA5MzY0NjYxMn0.0tEGcXoVMZme75ryvYUjBg37r_9rsV0lLmULqm7c32w';
  const ADMIN_PW = 'GoBlue';

  let state = {
    event: null, sessions: [], matchups: [], matchupPlayers: [],
    holeResults: [], players: { OH: [], MI: [] }, courses: [],
    entryMatchupId: null, entrySessionId: null, entryCourse: null,
  };

  async function api(path, opts = {}) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        Prefer: opts.prefer || 'return=representation',
      },
      ...opts,
    });
    if (!res.ok) { const err = await res.text(); throw new Error(err); }
    if (res.status === 204) return null;
    return res.json();
  }

  function get(table, query) { return api(table + '?' + (query || '')); }
  function post(table, body) { return api(table, { method: 'POST', body: JSON.stringify(body) }); }
  function patch(table, query, body) { return api(table + '?' + query, { method: 'PATCH', body: JSON.stringify(body), prefer: 'return=representation' }); }

  async function loadAll() {
    try {
      const events = await get('ohmi_events', 'active=eq.true&order=year.desc&limit=1');
      state.event = events[0];
      const [sessions, players, courses, matchups, matchupPlayers, holeResults] = await Promise.all([
        get('ohmi_sessions', 'event_id=eq.' + state.event.id + '&order=sort_order.asc'),
        get('ohmi_players', 'active=eq.true&order=team.asc,rank.asc'),
        get('ohmi_courses', 'order=name.asc'),
        get('ohmi_matchups', 'order=match_number.asc'),
        get('ohmi_matchup_players', 'order=position.asc'),
        get('ohmi_hole_results', 'order=hole_number.asc'),
      ]);
      state.sessions = sessions;
      state.players.OH = players.filter(function(p) { return p.team === 'OH'; });
      state.players.MI = players.filter(function(p) { return p.team === 'MI'; });
      state.courses = courses;
      state.matchups = matchups;
      state.matchupPlayers = matchupPlayers;
      state.holeResults = holeResults;
      renderScoreboard();
      renderAdminSessions();
      populateEntrySessions();
      populateCourseSelect();
    } catch(e) {
      console.error(e);
      showToast('Failed to load data', 'error');
    }
  }

  function connectRealtime() {
    try {
      var ws = new WebSocket(SUPABASE_URL.replace('https', 'wss') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0');
      ws.onopen = function() {
        ws.send(JSON.stringify({ topic: 'realtime:public:ohmi_hole_results', event: 'phx_join', payload: {}, ref: '1' }));
        ws.send(JSON.stringify({ topic: 'realtime:public:ohmi_matchups', event: 'phx_join', payload: {}, ref: '2' }));
        ws.send(JSON.stringify({ topic: 'realtime:public:ohmi_sessions', event: 'phx_join', payload: {}, ref: '3' }));
      };
      ws.onmessage = function(msg) {
        var data = JSON.parse(msg.data);
        if (data.event === 'INSERT' || data.event === 'UPDATE' || data.event === 'DELETE') loadAll();
      };
      ws.onclose = function() { setTimeout(connectRealtime, 3000); };
    } catch(e) { setTimeout(connectRealtime, 3000); }
  }

  function getMatchResults(matchupId) {
    return state.holeResults.filter(function(r) { return r.matchup_id === matchupId; });
  }

  function calcMatchStatus(results, totalHoles) {
    var ohUp = 0;
    results.forEach(function(r) {
      if (r.winner === 'OH') ohUp++;
      else if (r.winner === 'MI') ohUp--;
    });
    var holesPlayed = results.length;
    var holesLeft = totalHoles - holesPlayed;
    var statusText, statusClass;
    if (holesPlayed === 0 || ohUp === 0) { statusText = 'TIED'; statusClass = 'tied'; }
    else if (ohUp > 0) { statusText = ohUp + ' UP'; statusClass = 'oh-up'; }
    else { statusText = Math.abs(ohUp) + ' UP'; statusClass = 'mi-up'; }
    return { ohUp: ohUp, holesPlayed: holesPlayed, holesLeft: holesLeft, statusText: statusText, statusClass: statusClass };
  }

  function calcSessionPoints(sessionId) {
    var sessionMatchups = state.matchups.filter(function(m) { return m.session_id === sessionId; });
    var session = state.sessions.find(function(s) { return s.id === sessionId; });
    var totalHoles = (session && session.format === 'singles') ? 9 : 18;
    var ohPts = 0, miPts = 0;
    sessionMatchups.forEach(function(m) {
      var results = getMatchResults(m.id);
      var status = calcMatchStatus(results, totalHoles);
      if (m.status === 'closed' || status.holesPlayed === totalHoles) {
        if (status.ohUp > 0) ohPts += 1;
        else if (status.ohUp < 0) miPts += 1;
        else { ohPts += 0.5; miPts += 0.5; }
      }
    });
    return { ohPts: ohPts, miPts: miPts };
  }

  function buildHoleOrder(startingHole, totalHoles) {
    var holes = [];
    for (var i = 0; i < totalHoles; i++) holes.push(((startingHole - 1 + i) % 18) + 1);
    return holes;
  }

  function formatLabel(fmt) {
    var map = { scramble: 'Scramble', best_ball: 'Best Ball', alternate_shot: 'Alt. Shot', singles: 'Singles' };
    return map[fmt] || fmt;
  }

  function allPlayers() { return state.players.OH.concat(state.players.MI); }

  function renderScoreboard() {
    var totalOH = 0, totalMI = 0;
    var rows = '';
    state.sessions.forEach(function(session, i) {
      var pts = calcSessionPoints(session.id);
      totalOH += pts.ohPts; totalMI += pts.miPts;
      var hasPoints = pts.ohPts > 0 || pts.miPts > 0;
      rows += '<tr><td class="session-label">Rd ' + (i+1) + ' <span class="session-format-badge">' + formatLabel(session.format) + '</span></td>'
        + '<td class="oh-col">' + (hasPoints ? pts.ohPts : '—') + '</td>'
        + '<td class="mi-col">' + (hasPoints ? pts.miPts : '—') + '</td></tr>';
    });
    rows += '<tr class="total-row"><td class="session-label">Total</td><td class="oh-col">' + totalOH + '</td><td class="mi-col">' + totalMI + '</td></tr>';
    document.getElementById('points-table-body').innerHTML = rows;
    document.getElementById('oh-total').textContent = totalOH;
    document.getElementById('mi-total').textContent = totalMI;
    var total = totalOH + totalMI || 1;
    document.getElementById('progress-oh').style.width = ((totalOH / total) * 100) + '%';
    document.getElementById('progress-mi').style.width = ((totalMI / total) * 100) + '%';

    var container = document.getElementById('sessions-container');
    if (!state.sessions.length) { container.innerHTML = '<div class="empty-state">No sessions yet</div>'; return; }

    var html = '';
    state.sessions.forEach(function(session, i) {
      var sessionMatchups = state.matchups.filter(function(m) { return m.session_id === session.id; });
      var course = state.courses.find(function(c) { return c.id === session.course_id; });
      var totalHoles = session.format === 'singles' ? 9 : 18;
      html += '<div class="session-group"><div class="session-group-header">Round ' + (i+1) + ' — ' + session.name
        + ' <span class="session-status-pill ' + session.status + '">' + session.status + '</span></div>';
      if (!sessionMatchups.length) {
        html += '<div class="empty-state" style="padding:16px">No matchups set</div>';
      } else {
        sessionMatchups.forEach(function(matchup, mi) {
          var mPlayers = state.matchupPlayers.filter(function(p) { return p.matchup_id === matchup.id; });
          var ap = allPlayers();
          var ohNames = mPlayers.filter(function(p) { return p.team === 'OH'; }).map(function(p) { var pl = ap.find(function(x) { return x.id === p.player_id; }); return pl ? pl.name : '?'; });
          var miNames = mPlayers.filter(function(p) { return p.team === 'MI'; }).map(function(p) { var pl = ap.find(function(x) { return x.id === p.player_id; }); return pl ? pl.name : '?'; });
          var results = getMatchResults(matchup.id);
          var status = calcMatchStatus(results, totalHoles);
          var orderedHoles = buildHoleOrder(matchup.starting_hole, totalHoles);
          var dotsHtml = '<div class="hole-dots">';
          orderedHoles.forEach(function(h) {
            var result = results.find(function(r) { return r.hole_number === h; });
            var dotClass = '';
            if (result && result.winner === 'OH') dotClass = 'oh';
            else if (result && result.winner === 'MI') dotClass = 'mi';
            else if (result && result.winner === 'halved') dotClass = 'halved';
            dotsHtml += '<div class="hole-dot ' + dotClass + '">' + h + '</div>';
          });
          dotsHtml += '</div>';
          var statusLabel = matchup.status === 'closed' ? 'FINAL' : 'Thru ' + status.holesPlayed;
          html += '<div class="matchup-card"><div class="matchup-header">'
            + '<div class="matchup-team oh"><div class="player-name">' + ohNames.join('<br>') + '</div></div>'
            + '<div class="matchup-status-center"><div class="match-label">Match ' + (mi+1) + '</div>'
            + '<div class="match-status ' + status.statusClass + '">' + status.statusText + '</div>'
            + '<div class="holes-thru">' + statusLabel + '</div></div>'
            + '<div class="matchup-team mi"><div class="player-name">' + miNames.join('<br>') + '</div></div>'
            + '</div>' + dotsHtml + '</div>';
        });
      }
      html += '</div>';
    });
    container.innerHTML = html;
  }

  function populateEntrySessions() {
    var sel = document.getElementById('entry-session-select');
    var activeSessions = state.sessions.filter(function(s) { return s.status === 'active'; });
    if (activeSessions.length) {
      sel.innerHTML = '<option value="">Select session...</option>' + activeSessions.map(function(s) { return '<option value="' + s.id + '">' + s.name + '</option>'; }).join('');
    } else {
      sel.innerHTML = '<option value="">No active sessions</option>';
    }
  }

  document.getElementById('entry-session-select').addEventListener('change', function() {
    state.entrySessionId = this.value;
    populateEntryMatchups();
    document.getElementById('entry-content').style.display = 'none';
  });

  function populateEntryMatchups() {
    var sel = document.getElementById('entry-matchup-select');
    if (!state.entrySessionId) { sel.innerHTML = '<option value="">Select matchup...</option>'; sel.disabled = true; return; }
    var ap = allPlayers();
    var sessionMatchups = state.matchups.filter(function(m) { return m.session_id === state.entrySessionId; });
    sel.disabled = false;
    sel.innerHTML = '<option value="">Select matchup...</option>' + sessionMatchups.map(function(m) {
      var mPlayers = state.matchupPlayers.filter(function(p) { return p.matchup_id === m.id; });
      var ohNames = mPlayers.filter(function(p) { return p.team === 'OH'; }).map(function(p) { var pl = ap.find(function(x) { return x.id === p.player_id; }); return pl ? pl.name : '?'; }).join(' / ');
      var miNames = mPlayers.filter(function(p) { return p.team === 'MI'; }).map(function(p) { var pl = ap.find(function(x) { return x.id === p.player_id; }); return pl ? pl.name : '?'; }).join(' / ');
      return '<option value="' + m.id + '">Match ' + m.match_number + ': ' + ohNames + ' vs ' + miNames + '</option>';
    }).join('');
  }

  document.getElementById('entry-matchup-select').addEventListener('change', function() {
    state.entryMatchupId = this.value;
    if (!this.value) { document.getElementById('entry-content').style.display = 'none'; return; }
    loadEntryHoles();
  });

  function loadEntryHoles() {
    var matchup = state.matchups.find(function(m) { return m.id === state.entryMatchupId; });
    var session = state.sessions.find(function(s) { return s.id === matchup.session_id; });
    var course = state.courses.find(function(c) { return c.id === session.course_id; });
    state.entryCourse = course;
    var totalHoles = session.format === 'singles' ? 9 : 18;
    var orderedHoles = buildHoleOrder(matchup.starting_hole, totalHoles);
    var results = state.holeResults.filter(function(r) { return r.matchup_id === matchup.id; });
    document.getElementById('entry-content').style.display = 'block';
    updateEntryStatus(results, totalHoles);
    renderEntryHoles(orderedHoles, results, course);
  }

  function renderEntryHoles(orderedHoles, results, course) {
    var pars = (course && course.pars) ? course.pars : [];
    var html = '';
    orderedHoles.forEach(function(holeNum) {
      var result = results.find(function(r) { return r.hole_number === holeNum; });
      var par = pars[holeNum - 1] || '—';
      var ohSel = (result && result.winner === 'OH') ? ' selected' : '';
      var halvSel = (result && result.winner === 'halved') ? ' selected' : '';
      var miSel = (result && result.winner === 'MI') ? ' selected' : '';
      html += '<div class="hole-entry-card" id="hole-card-' + holeNum + '">'
        + '<div class="hole-entry-header"><div class="hole-entry-num">Hole ' + holeNum + '</div><div class="hole-entry-par">Par ' + par + '</div></div>'
        + '<div class="winner-btns">'
        + '<button class="winner-btn oh-btn' + ohSel + '" onclick="recordHole(' + holeNum + ', \'OH\')">Ohio</button>'
        + '<button class="winner-btn halved-btn' + halvSel + '" onclick="recordHole(' + holeNum + ', \'halved\')">Halved</button>'
        + '<button class="winner-btn mi-btn' + miSel + '" onclick="recordHole(' + holeNum + ', \'MI\')">Mich</button>'
        + '</div></div>';
    });
    document.getElementById('entry-holes-container').innerHTML = html;
  }

  async function recordHole(holeNum, winner) {
    try {
      var existing = state.holeResults.find(function(r) { return r.matchup_id === state.entryMatchupId && r.hole_number === holeNum; });
      if (existing) {
        await patch('ohmi_hole_results', 'id=eq.' + existing.id, { winner: winner });
        existing.winner = winner;
      } else {
        var newResult = await post('ohmi_hole_results', { matchup_id: state.entryMatchupId, hole_number: holeNum, winner: winner });
        state.holeResults.push(newResult[0]);
      }
      var card = document.getElementById('hole-card-' + holeNum);
      card.querySelectorAll('.winner-btn').forEach(function(b) { b.classList.remove('selected'); });
      var btnClass = winner === 'OH' ? '.oh-btn' : (winner === 'MI' ? '.mi-btn' : '.halved-btn');
      card.querySelector(btnClass).classList.add('selected');
      var matchup = state.matchups.find(function(m) { return m.id === state.entryMatchupId; });
      var session = state.sessions.find(function(s) { return s.id === matchup.session_id; });
      var totalHoles = session.format === 'singles' ? 9 : 18;
      var results = state.holeResults.filter(function(r) { return r.matchup_id === state.entryMatchupId; });
      updateEntryStatus(results, totalHoles);
      renderScoreboard();
    } catch(e) { console.error(e); showToast('Failed to save', 'error'); }
  }

  function updateEntryStatus(results, totalHoles) {
    var status = calcMatchStatus(results, totalHoles);
    var el = document.getElementById('entry-status-value');
    el.textContent = status.statusText;
    el.className = 'status-value ' + status.statusClass;
    document.getElementById('entry-holes-thru').textContent = 'Thru ' + status.holesPlayed;
  }

  function checkAdminPw() {
    var pw = document.getElementById('admin-pw-input').value;
    if (pw === ADMIN_PW) {
      document.getElementById('admin-password-gate').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
    } else {
      document.getElementById('admin-pw-error').textContent = 'Incorrect password';
    }
  }

  document.getElementById('admin-pw-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') checkAdminPw(); });

  function populateCourseSelect() {
    var sel = document.getElementById('session-course');
    sel.innerHTML = state.courses.map(function(c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');
  }

  var pairingCount = 0;

  function addPairingRow() {
    pairingCount++;
    var teamSize = parseInt(document.getElementById('session-team-size').value);
    var ohSelects = '';
    var miSelects = '';
    for (var i = 0; i < teamSize; i++) {
      ohSelects += '<select class="pairing-oh-player"><option value="">OH Player ' + (i+1) + '...</option>'
        + state.players.OH.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('') + '</select>';
      miSelects += '<select class="pairing-mi-player"><option value="">MI Player ' + (i+1) + '...</option>'
        + state.players.MI.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('') + '</select>';
    }
    var holeOptions = '';
    for (var h = 1; h <= 18; h++) holeOptions += '<option value="' + h + '">Hole ' + h + '</option>';
    var row = document.createElement('div');
    row.className = 'pairing-builder';
    row.innerHTML = '<h4>Match ' + pairingCount + ' <button class="remove-pairing-btn" onclick="this.closest(\'.pairing-builder\').remove()">✕</button></h4>'
      + '<div class="pairing-teams">'
      + '<div class="pairing-team-col oh-col"><label>Ohio</label>' + ohSelects + '</div>'
      + '<div class="pairing-team-col mi-col"><label>Michigan</label>' + miSelects + '</div>'
      + '</div>'
      + '<div class="starting-hole-row"><label>Starting Hole</label><select class="pairing-start-hole">' + holeOptions + '</select></div>';
    document.getElementById('pairings-container').appendChild(row);
  }

  document.getElementById('session-team-size').addEventListener('change', function() {
    document.getElementById('pairings-container').innerHTML = '';
    pairingCount = 0;
  });

  async function createSession() {
    var name = document.getElementById('session-name').value.trim();
    var date = document.getElementById('session-date').value;
    var format = document.getElementById('session-format').value;
    var teamSize = parseInt(document.getElementById('session-team-size').value);
    var courseId = document.getElementById('session-course').value;
    var sortOrder = parseInt(document.getElementById('session-sort').value);
    if (!name) { showToast('Session name required', 'error'); return; }
    try {
      var sessionRes = await post('ohmi_sessions', {
        event_id: state.event.id, name: name, session_date: date || null,
        format: format, team_size: teamSize, course_id: courseId || null,
        sort_order: sortOrder, status: 'upcoming',
      });
      var session = sessionRes[0];
      var pairingRows = document.querySelectorAll('.pairing-builder');
      for (var i = 0; i < pairingRows.length; i++) {
        var row = pairingRows[i];
        var startHole = parseInt(row.querySelector('.pairing-start-hole').value);
        var matchupRes = await post('ohmi_matchups', { session_id: session.id, match_number: i+1, starting_hole: startHole, status: 'upcoming' });
        var matchup = matchupRes[0];
        var ohSels = row.querySelectorAll('.pairing-oh-player');
        var miSels = row.querySelectorAll('.pairing-mi-player');
        for (var j = 0; j < ohSels.length; j++) {
          if (ohSels[j].value) await post('ohmi_matchup_players', { matchup_id: matchup.id, player_id: ohSels[j].value, team: 'OH', position: j+1 });
        }
        for (var k = 0; k < miSels.length; k++) {
          if (miSels[k].value) await post('ohmi_matchup_players', { matchup_id: matchup.id, player_id: miSels[k].value, team: 'MI', position: k+1 });
        }
      }
      showToast('Session created!', 'success');
      document.getElementById('session-name').value = '';
      document.getElementById('pairings-container').innerHTML = '';
      pairingCount = 0;
      await loadAll();
    } catch(e) { console.error(e); showToast('Failed to create session', 'error'); }
  }

  function renderAdminSessions() {
    var container = document.getElementById('admin-sessions-list');
    if (!state.sessions.length) { container.innerHTML = '<div class="empty-state">No sessions yet</div>'; return; }
    container.innerHTML = state.sessions.map(function(s) {
      var btns = '';
      if (s.status !== 'active') btns += '<button class="btn-sm open" onclick="setSessionStatus(\'' + s.id + '\', \'active\')">Open</button>';
      if (s.status === 'active') btns += '<button class="btn-sm close" onclick="setSessionStatus(\'' + s.id + '\', \'closed\')">Close</button>';
      if (s.status === 'closed') btns += '<button class="btn-sm" onclick="setSessionStatus(\'' + s.id + '\', \'upcoming\')">Reopen</button>';
      return '<div class="admin-session-row"><div class="admin-session-info"><div class="admin-session-name">' + s.name + '</div><div class="admin-session-meta">' + formatLabel(s.format) + ' · ' + (s.session_date || 'No date') + '</div></div><div class="admin-session-actions">' + btns + '</div></div>';
    }).join('');
  }

  async function setSessionStatus(sessionId, status) {
    try {
      await patch('ohmi_sessions', 'id=eq.' + sessionId, { status: status });
      showToast('Session ' + status, 'success');
      await loadAll();
    } catch(e) { showToast('Failed to update session', 'error'); }
  }

  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '') + ' show';
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  loadAll();
  connectRealtime();
</script>

</body>
</html>
